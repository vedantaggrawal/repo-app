<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Build - DevOps Webserver</title>
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
            color: #333;
        }
        .container {
            background-color: #fff;
            padding: 2rem 4rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 {
            font-size: 2rem;
            margin: 0;
            color: #e60000; /* Vodafone red accent */
        }
        .date {
            margin-top: 1rem;
            font-size: 1.25rem;
            font-weight: 500;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello DevOps O&Si Vedant Aggrawal. hey guys!</h1>
        <div class="date" id="current-date"></div>
    </div>
    <script>
        // Use client-side JS to show the date in the user's timezone instead of server's timezone
        document.getElementById('current-date').innerText = new Date().toLocaleString(undefined, { 
            weekday: 'long', 
            year: 'numeric', 
            month: 'long', 
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit',
            timeZoneName: 'short'
        });
    </script>
</body>
</html>
