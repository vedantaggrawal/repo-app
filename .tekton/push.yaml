apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  name: repo-app-push
  annotations:
    # PAC Annotations for git events
    pipelinesascode.tekton.dev/on-event: "[push]"
    pipelinesascode.tekton.dev/on-target-branch: "[main]"
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    pipelinesascode.tekton.dev/task: "[git-clone, buildah]"
spec:
  params:
    - name: repo_url
      value: "{{ repo_url }}"
    - name: revision
      value: "{{ revision }}"
  pipelineSpec:
    params:
      - name: repo_url
      - name: revision
    workspaces:
      - name: source
    tasks:
      - name: fetch-repository
        taskRef:
          name: git-clone
          kind: ClusterTask
        workspaces:
          - name: output
            workspace: source
        params:
          - name: url
            value: $(params.repo_url)
          - name: revision
            value: $(params.revision)
      
      - name: build-and-push
        runAfter:
          - fetch-repository
        taskRef:
          name: buildah
          kind: ClusterTask
        workspaces:
          - name: source
            workspace: source
        params:
          - name: IMAGE
            value: "ghcr.io/vedantaggrawal/repo-app:$(params.revision)"
  workspaces:
    - name: source
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi
