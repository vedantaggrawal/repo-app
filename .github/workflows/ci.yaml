name: CI Pipeline

on:
  push:
    branches: [main]
    tags: ['v*.*.*']

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}
  RELEASE_IMAGE: ghcr.io/${{ github.repository }}-release

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          npm install -g htmlhint
          htmlhint src/index.html

  # Push to main — build artifact with sha tag
  build:
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: type=sha,format=short
      - uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: local-scan:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: local-scan:latest
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Git tag pushed — SAST scan, then promote to release repo
  promote:
    needs: lint-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve source tag
        id: src
        run: echo "tag=sha-$(echo '${{ github.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}:${{ steps.src.outputs.tag }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'
      - name: Promote to release repo
        run: |
          docker buildx imagetools create \
            -t ${{ env.RELEASE_IMAGE }}:${{ github.ref_name }} \
            ${{ env.IMAGE }}:${{ steps.src.outputs.tag }}
